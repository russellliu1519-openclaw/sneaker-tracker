<style>

    --red: #dc2626;

    --text: #1e293b;
    --muted: #64748b;

  header h1 { font-size: 1.3rem; font-weight: 700; }
  header h1 span { color: var(--accent); }
  .header-stats { display: flex; gap: 12px; margin-left: auto; flex-wrap: wrap; }
  .stat-pill { background: var(--bg); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; font-size: 0.8rem; }
  .stat-pill b { color: var(--accent); }

  .toolbar { padding: 16px 24px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; background: var(--card); border-bottom: 1px solid var(--border); }
  .toolbar input, .toolbar select { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 7px 12px; border-radius: 8px; font-size: 0.85rem; }
  .toolbar input[type=text] { width: 220px; }
  .btn { padding: 7px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: opacity 0.15s; }
  .btn:hover { opacity: 0.8; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-success { background: var(--green); color: #fff; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }

  .shipping-bar { padding: 12px 24px; background: #eef2ff; border-bottom: 1px solid var(--border); display: flex; gap: 24px; flex-wrap: wrap; align-items: center; font-size: 0.82rem; color: var(--text); }
  .shipping-bar input { background: #fff; border: 1px solid var(--border); color: var(--text); padding: 4px 10px; border-radius: 6px; width: 80px; font-size: 0.85rem; }
  .shipping-bar .formula { color: var(--accent); font-weight: 600; }

  .main { padding: 20px 24px; }
  .brand-section { margin-bottom: 32px; }
  .brand-title { font-size: 1rem; font-weight: 700; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .brand-title::before { content: ''; display: inline-block; width: 4px; height: 16px; background: var(--accent); border-radius: 2px; }

  .shoe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 14px; }

  .shoe-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; transition: border-color 0.2s; }
  .shoe-card:hover { border-color: var(--accent); }
  .shoe-card.profit-high { border-left: 3px solid var(--green); }
  .shoe-card.profit-mid  { border-left: 3px solid var(--yellow); }
  .shoe-card.profit-low  { border-left: 3px solid var(--red); }

  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .shoe-name { font-weight: 700; font-size: 0.92rem; line-height: 1.3; }
  .shoe-sku  { color: var(--muted); font-size: 0.72rem; margin-top: 3px; font-family: monospace; }
  .platform-badge { font-size: 0.7rem; padding: 3px 8px; border-radius: 10px; background: var(--bg); border: 1px solid var(--border); }

  /* 4-col price grid */
  .price-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .price-box { background: var(--bg); border-radius: 8px; padding: 8px 10px; text-align: center; }
  .price-box label { font-size: 0.64rem; color: var(--muted); display: block; margin-bottom: 3px; }
  .price-box input { background: transparent; border: none; color: var(--text); font-size: 0.9rem; font-weight: 700; text-align: center; width: 100%; }
  .price-box input:focus { outline: 1px solid var(--accent); border-radius: 4px; }
  .price-box.highlight { background: #eff6ff; }

  .profit-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .profit-chip { border-radius: 8px; padding: 6px 12px; font-size: 0.82rem; font-weight: 700; flex: 1; text-align: center; }
  .chip-sea { background: rgba(22,163,74,0.1);  color: var(--green);  border: 1px solid rgba(22,163,74,0.3); }
  .chip-air { background: rgba(217,119,6,0.1);  color: var(--yellow); border: 1px solid rgba(217,119,6,0.3); }
  .chip-neg { background: rgba(220,38,38,0.1);  color: var(--red);    border: 1px solid rgba(220,38,38,0.3); }

  .size-section { margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px; }
  .size-toggle { font-size: 0.75rem; color: var(--muted); cursor: pointer; user-select: none; }
  .size-toggle:hover { color: var(--accent); }
  .size-table { display: none; margin-top: 8px; overflow-x: auto; }
  .size-table.open { display: block; }
  .size-table table { width: 100%; font-size: 0.75rem; border-collapse: collapse; }
  .size-table th { color: var(--muted); padding: 5px 6px; text-align: center; border-bottom: 1px solid var(--border); background: var(--bg); }
  .size-table td { padding: 4px 5px; text-align: center; border-bottom: 1px solid #f1f5f9; }
  .size-table td input { background: var(--bg); border: 1px solid var(--border); color: var(--text); width: 70px; padding: 3px 5px; border-radius: 5px; text-align: center; font-size: 0.75rem; }
  .size-profit-pos { color: var(--green); font-weight: 700; }
  .size-profit-neg { color: var(--red); }
  .size-pct { font-size: 0.7rem; color: var(--muted); }

  .history-section { margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px; }
  .history-toggle { font-size: 0.75rem; color: var(--muted); cursor: pointer; user-select: none; }
  .history-toggle:hover { color: var(--accent); }
  .history-area { display: none; margin-top: 8px; }
  .history-area.open { display: block; }
  .history-entries { max-height: 140px; overflow-y: auto; font-size: 0.75rem; }
  .history-entry { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid var(--border); gap: 8px; }
  .history-entry:last-child { border-bottom: none; }
  .history-add { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
  .history-add input, .history-add select { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; }

  /* Sales chart */
  .chart-section { margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px; }
  .chart-toggle { font-size: 0.75rem; color: var(--muted); cursor: pointer; user-select: none; }
  .chart-toggle:hover { color: var(--accent); }
  .chart-area { display: none; margin-top: 10px; }
  .chart-area.open { display: block; }
  .chart-wrap { position: relative; height: 220px; }
  .chart-inputs { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; align-items: center; font-size: 0.75rem; color: var(--muted); }
  .chart-inputs input { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; }
  .trend-summary { margin-top: 8px; padding: 8px 12px; background: var(--bg); border-radius: 8px; font-size: 0.78rem; line-height: 1.6; }

  .img-upload { margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px; }
  .img-upload label { font-size: 0.75rem; color: var(--muted); cursor: pointer; display: flex; align-items: center; gap: 6px; }
  .img-upload label:hover { color: var(--accent); }
  .img-upload input[type=file] { display: none; }
  .img-thumb { width: 60px; height: 40px; object-fit: cover; border-radius: 5px; border: 1px solid var(--border); }

  .add-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
  .add-modal.open { display: flex; }
  .modal-box { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 24px; width: 440px; max-width: 95vw; }

  .modal-box .field { margin-bottom: 12px; }
  .modal-box label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 5px; }
  .modal-box input, .modal-box select, .modal-box textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 8px; font-size: 0.88rem; }

  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--green); color: #fff; padding: 10px 18px; border-radius: 10px; font-size: 0.85rem; font-weight: 600; opacity: 0; transition: opacity 0.3s; z-index: 200; pointer-events: none; }

</head>

<header>
  <div>
    <h1>🐯 球鞋<span>套利</span>追踪器</h1>
    <div style="font-size:0.72rem;color:var(--muted);margin-top:2px;">国内购入（得物）→ StockX / GOAT 转售</div>
  </div>
  <div class="header-stats">
    <div class="stat-pill">总鞋款 <b id="totalCount">0</b></div>
    <div class="stat-pill">海运正利润 <b id="profitSeaCount" style="color:var(--green)">0</b></div>
    <div class="stat-pill">空运正利润 <b id="profitAirCount" style="color:var(--yellow)">0</b></div>
  </div>
</header>

<div class="shipping-bar">
  <div>🚢 中国海运：$<input type="number" id="seaCost" value="10" min="0" step="0.5" oninput="render()"></div>
  <div>✈️ 中国空运：$<input type="number" id="airCost" value="25" min="0" step="0.5" oninput="render()"></div>
  <div class="formula">💡 利润 = StockX货款 − 得物成本 − 中国运费</div>
  <div style="color:var(--muted);font-size:0.78rem">货款 = StockX已扣除手续费+支付手续费+StockX运费后的到手金额</div>
</div>

<div class="toolbar">
  <input type="text" id="searchBox" placeholder="🔍 搜索鞋款/SKU..." oninput="render()">
  <select id="brandFilter" onchange="render()">
    <option value="">所有品牌</option>
    <option>ASICS</option><option>New Balance</option><option>Salomon</option>
  </select>
  <select id="profitFilter" onchange="render()">
    <option value="">所有利润</option>
    <option value="sea">海运正利润</option>
    <option value="air">空运正利润</option>
    <option value="neg">亏损</option>
  </select>
  <button class="btn btn-primary" onclick="openModal()">+ 添加鞋款</button>
  <button class="btn btn-success" onclick="exportCSV()">↓ 导出CSV</button>
  <button class="btn btn-outline" onclick="saveData()">💾 保存</button>
</div>

<div class="main" id="mainContent"></div>

<div class="add-modal" id="addModal">
  <div class="modal-box">
    <h2>➕ 添加鞋款</h2>
    <div class="field"><label>品牌</label>
      <select id="mBrand"><option>ASICS</option><option>Nike</option><option>Anta</option><option>New Balance</option><option>Other</option></select>
    </div>
    <div class="field"><label>型号名称</label><input type="text" id="mName" placeholder="e.g. Gel-Kayano 14"></div>
    <div class="field"><label>SKU / 货号</label><input type="text" id="mSku" placeholder="e.g. 1203A537-110"></div>
    <div class="field"><label>配色</label><input type="text" id="mColor" placeholder="e.g. White Graphite Grey"></div>
    <div class="field"><label>平台</label>
      <select id="mPlatform"><option>StockX</option><option>GOAT</option><option>两者</option></select>
    </div>
    <div class="field"><label>得物成本 ($)</label><input type="number" id="mCost" placeholder="0.00" step="0.01"></div>
    <div class="field"><label>StockX 最低报价 ($)</label><input type="number" id="mStx" placeholder="0.00" step="0.01"></div>
    <div class="field"><label>StockX 货款 ($, 到手)</label><input type="number" id="mPayout" placeholder="0.00" step="0.01"></div>
    <div class="field"><label>GOAT 货款 ($)</label><input type="number" id="mGoat" placeholder="0.00" step="0.01"></div>
    <div class="field"><label>备注</label><textarea id="mNotes" placeholder="备注..."></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="addShoe()">添加</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

// ── Calc ──────────────────────────────────────────────────────────────────────
// profit = payout (货款, 已扣StockX所有费用) - 得物成本 - 中国运费
function calcProfit(payout, cost, shipCost) {
  if (!payout || !cost) return null;
  return payout - cost - shipCost;
}
function fmtProfit(val) {
  if (val === null) return '—';
  return (val >= 0 ? '+' : '') + '$' + val.toFixed(2);
}
function fmtPct(payout, cost) {
  if (!payout || !cost) return '';
  return ((payout / cost - 1) * 100).toFixed(0) + '%';
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const search    = document.getElementById('searchBox').value.toLowerCase();
  const brandF    = document.getElementById('brandFilter').value;
  const profitF   = document.getElementById('profitFilter').value;
  const sea       = parseFloat(document.getElementById('seaCost').value) || 10;
  const air       = parseFloat(document.getElementById('airCost').value) || 25;

  let filtered = shoes.filter(s => {
    if (search && !s.model.toLowerCase().includes(search) && !s.sku.toLowerCase().includes(search) && !s.color.toLowerCase().includes(search)) return false;
    if (brandF && s.brand !== brandF) return false;
    if (profitF) {
      const po = s.payout || s.goatPayout;
      const pSea = calcProfit(po, s.cost, sea);
      const pAir = calcProfit(po, s.cost, air);
      if (profitF === 'sea' && (pSea === null || pSea < 0)) return false;
      if (profitF === 'air' && (pAir === null || pAir < 0)) return false;
      if (profitF === 'neg' && (pSea === null || pSea >= 0)) return false;
    }
    return true;
  });

  // Header stats
  let seaPos = 0, airPos = 0;
  shoes.forEach(s => {
    const po = s.payout || s.goatPayout;
    if (calcProfit(po, s.cost, sea) > 0) seaPos++;
    if (calcProfit(po, s.cost, air) > 0) airPos++;
  });
  document.getElementById('totalCount').textContent = shoes.length;
  document.getElementById('profitSeaCount').textContent = seaPos;
  document.getElementById('profitAirCount').textContent = airPos;

  const container = document.getElementById('mainContent');
  if (!filtered.length) {
    container.innerHTML = '<div class="empty-state"><div class="icon">👟</div><div>没有找到匹配的鞋款</div></div>';
    return;
  }

  const groups = {};
  filtered.forEach(s => { (groups[s.brand] = groups[s.brand] || []).push(s); });

  container.innerHTML = Object.entries(groups).map(([brand, items]) => `
    <div class="brand-section">
      <div class="brand-title">${brand} <span style="font-weight:400;font-size:0.8rem">(${items.length}款)</span></div>
      <div class="shoe-grid">${items.map(s => renderCard(s, sea, air)).join('')}</div>
    </div>`).join('');
}

function renderCard(s, sea, air) {
  const po  = s.platform === 'GOAT' ? s.goatPayout : (s.payout || s.goatPayout);
  const pSea = calcProfit(po, s.cost, sea);
  const pAir = calcProfit(po, s.cost, air);

  const cardClass = pSea === null ? '' : pSea >= 20 ? 'profit-high' : pSea >= 0 ? 'profit-mid' : 'profit-low';
  const seaClass  = pSea === null ? '' : pSea >= 0 ? 'chip-sea' : 'chip-neg';
  const airClass  = pAir === null ? '' : pAir >= 0 ? 'chip-air' : 'chip-neg';

  const histHtml = s.history.length

  const sizeRows = EU_SIZES.map(sz => {

    const szPSea   = calcProfit(szPayout, szCost, sea);
    const szPAir   = calcProfit(szPayout, szCost, air);
    const hasPrices = szStx || szPayout;
    if (!hasPrices && !szCost) return ''; // skip completely empty rows unless default cost
    return `<tr>
      <td><b>EU ${sz}</b></td>
      <td><input type="number" placeholder="${s.cost||'—'}" value="${d.cost||''}" step="0.01" onchange="updateSize('${s.id}','${sz}','cost',this.value)"></td>

  return `
  <div class="shoe-card ${cardClass}" id="card-${s.id}">
    <div class="card-header">
      <div>
        <div class="shoe-name">${s.model} <span style="color:var(--muted);font-weight:400">${s.color}</span></div>

        <div class="platform-badge">${s.platform}</div>
        <button class="btn btn-outline" style="padding:2px 8px;font-size:0.68rem" onclick="deleteShoe('${s.id}')">删除</button>
      </div>
    </div>

    <div class="price-grid">
      <div class="price-box">
        <label>🛒 得物成本</label>
        <input type="number" value="${s.cost||''}" placeholder="—" step="0.01" onchange="updateField('${s.id}','cost',this.value)">
      </div>
      <div class="price-box">
        <label>📦 StockX最低报价</label>
        <input type="number" value="${s.stx||''}" placeholder="—" step="0.01" onchange="updateField('${s.id}','stx',this.value)">
      </div>
      <div class="price-box highlight">
        <label>💰 货款（到手）</label>
        <input type="number" value="${s.payout||''}" placeholder="—" step="0.01" onchange="updateField('${s.id}','payout',this.value)">
      </div>
      <div class="price-box">
        <label>🐐 GOAT货款</label>
        <input type="number" value="${s.goatPayout||''}" placeholder="—" step="0.01" onchange="updateField('${s.id}','goatPayout',this.value)">
      </div>
    </div>

    <div class="profit-row">
      <div class="profit-chip ${seaClass}">🚢 海运利润：${fmtProfit(pSea)}</div>
      <div class="profit-chip ${airClass}">✈️ 空运利润：${fmtProfit(pAir)}</div>
    </div>
    ${s.notes ? `<div style="font-size:0.75rem;color:var(--muted);margin-top:8px">💬 ${s.notes}</div>` : ''}

    <div class="size-section">

        </table>
      </div>
    </div>



    ${(s.id === 'k14-1' || s.id === 'k14-2' || s.id === 'gnyc-1' || s.id === 'nb550-2' || s.id === 'sal-xt6') ? `
    <div class="chart-section">

// ── Interactions ──────────────────────────────────────────────────────────────
function updateField(id, field, val) {
  const s = getById(id); if (!s) return;
  s[field] = parseFloat(val) || 0;
  saveData(); render();
}
function updateSize(id, sz, field, val) {
  const s = getById(id); if (!s) return;
  if (!s.sizes[sz]) s.sizes[sz] = {};
  s.sizes[sz][field] = parseFloat(val) || 0;
  saveData(); render();
}
function toggleEl(id) {
  document.getElementById(id).classList.toggle('open');
  if (id.startsWith('chart-')) {
    const sid = id.replace('chart-', '');
    setTimeout(() => buildChart(sid), 50);
  }
}

function addHistory(id) {
  const s = getById(id); if (!s) return;
  const date  = document.getElementById('hdate-'+id).value;
  const size  = document.getElementById('hsize-'+id).value;
  const price = parseFloat(document.getElementById('hprice-'+id).value);
  const plat  = document.getElementById('hplat-'+id).value;
  if (!date || !size || !price) { showToast('⚠️ 请填写完整'); return; }
  s.history.unshift({ date, size, price, platform: plat });
  saveData(); render();
}
function deleteShoe(id) {
  if (!confirm('确认删除？')) return;
  shoes = shoes.filter(s => s.id !== id);
  saveData(); render();
}

function exportCSV() {
  const sea = parseFloat(document.getElementById('seaCost').value) || 10;
  const air = parseFloat(document.getElementById('airCost').value) || 25;
  const rows = [['品牌','型号','SKU','配色','平台','得物成本','最低报价','货款(到手)','海运利润','空运利润','备注']];
  shoes.forEach(s => {
    const po = s.platform === 'GOAT' ? s.goatPayout : (s.payout || s.goatPayout);
    rows.push([s.brand, s.model, s.sku, s.color, s.platform,
      s.cost||'', s.stx||'', s.payout||'',
      calcProfit(po,s.cost,sea)?.toFixed(2)||'',
      calcProfit(po,s.cost,air)?.toFixed(2)||'',
      s.notes]);
  });
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8'})),
    download: `sneaker-${new Date().toISOString().slice(0,10)}.csv`
  });
  a.click();
}

let charts = {};

function makeLineChart(canvasId, labels, datasets, yLabel) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  if (charts[canvasId]) { charts[canvasId].destroy(); }
  charts[canvasId] = new Chart(canvas, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { position: 'top', labels: { font:{size:11}, boxWidth:12, padding:8 } },
        tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: $${ctx.raw}` } }
      },
      scales: {
        x: { grid: { color:'#f1f5f9' }, ticks: { font:{size:11} } },
        y: {
          title: { display:true, text: yLabel||'成交价 ($)', font:{size:11} },
          grid: { color:'#f1f5f9' },
          ticks: { callback: v => '$'+v }
        }
      }
    }
  });
}

    const recBg = seaOk && d.count >= 40 ? 'background:#f0fdf4' : '';
    return `<tr style="${recBg}">
      <td style="font-weight:700">#${i+1}</td>
      <td>US${d.usSize}</td>
      <td><b>EU${d.euSize}</b></td>
      <td><b>${d.count}</b></td>
      <td style="color:#6c63ff">${d.early} → ${d.late}</td>
      <td>${trendIcon(d.trend)} ${trendLabel(d.trend)}</td>
      <td>$${d.avgPrice}</td>
      <td>${pSea}</td>
      <td>${pAir}</td>
      <td style="color:#6c63ff;font-weight:700">~${forecast}</td>
    </tr>`;
  }).join('');

  // Build summary table
  const trendIconFn = t => t==='up'?'📈':t==='down'?'📉':'➡️';
  const priceTrendOf = key => {
    const w = WEEKLY_PRICE[key]; if (!w) return '—';
    const diff = w[3] - w[0];
    return diff > 10 ? '📈涨价+$'+diff : diff < -10 ? '📉跌价-$'+Math.abs(diff) : '➡️平稳';
  };
  const profitBothKeys  = {'US9.5':'EU43.5','US8.5':'EU42','US9':'EU42.5','US6':'EU39','US5.5':'EU38','US6.5':'EU39.5','US10.5':'EU44.5','US11.5':'EU46'};
  const seaOnlyKeys     = {'US8':'EU41.5','US10':'EU44','US11':'EU45','US12':'EU46.5'};
  const neitherKeys     = {'US7.5':'EU40.5','US5':'EU37.5','US7':'EU40','US4.5':'EU37','US4':'EU36'};

  const rowsProfit = SIZE_CHART_DATA.filter(d=>d.profitAir!==null&&d.profitAir>0).sort((a,b)=>b.count-a.count).map(d=>{
    const key=`US${d.usSize}(EU${d.euSize})`;
    const w=WEEKLY_PRICE[key]||[];
    const pSea=`<span style="color:#16a34a;font-weight:700">+$${d.profitSea?.toFixed(0)}</span>`;
    const pAir=`<span style="color:#16a34a;font-weight:700">+$${d.profitAir?.toFixed(0)}</span>`;
    return `<tr style="background:#f0fdf4"><td>EU${d.euSize}</td><td>US${d.usSize}</td><td><b>${d.count}</b></td><td>${trendIconFn(d.trend)}</td><td>${w.map(p=>'$'+p).join('→')}</td><td>${priceTrendOf(key)}</td><td>${pSea}</td><td>${pAir}</td><td style="color:#6c63ff">~${Math.round(d.late*1.94)}</td></tr>`;
  }).join('');

  const rowsSea = SIZE_CHART_DATA.filter(d=>d.profitSea!==null&&d.profitSea>0&&(d.profitAir===null||d.profitAir<=0)).sort((a,b)=>b.count-a.count).map(d=>{
    const key=`US${d.usSize}(EU${d.euSize})`;
    const w=WEEKLY_PRICE[key]||[];
    const pSea=`<span style="color:#d97706;font-weight:700">+$${d.profitSea?.toFixed(0)}</span>`;
    const pAir=d.profitAir!==null?`<span style="color:#dc2626">-$${Math.abs(d.profitAir).toFixed(0)}</span>`:'—';
    return `<tr style="background:#fffbeb"><td>EU${d.euSize}</td><td>US${d.usSize}</td><td><b>${d.count}</b></td><td>${trendIconFn(d.trend)}</td><td>${w.map(p=>'$'+p).join('→')}</td><td>${priceTrendOf(key)}</td><td>${pSea}</td><td>${pAir}</td><td style="color:#6c63ff">~${Math.round(d.late*1.94)}</td></tr>`;
  }).join('');

  const rowsLoss = SIZE_CHART_DATA.filter(d=>d.profitSea===null||d.profitSea<=0).sort((a,b)=>b.count-a.count).map(d=>{
    const key=`US${d.usSize}(EU${d.euSize})`;
    const w=WEEKLY_PRICE[key]||[];
    const pSea=d.profitSea!==null?`<span style="color:#dc2626">-$${Math.abs(d.profitSea).toFixed(0)}</span>`:'—';
    const pAir=d.profitAir!==null?`<span style="color:#dc2626">-$${Math.abs(d.profitAir).toFixed(0)}</span>`:'—';
    return `<tr><td>EU${d.euSize}</td><td>US${d.usSize}</td><td><b>${d.count}</b></td><td>${trendIconFn(d.trend)}</td><td>${w.map(p=>'$'+p).join('→')}</td><td>${priceTrendOf(key)}</td><td>${pSea}</td><td>${pAir}</td><td style="color:#6c63ff">~${Math.round(d.late*1.94)}</td></tr>`;
  }).join('');

  const thead = `<tr style="background:#f1f5f9;color:#64748b;font-size:0.72rem"><th style="padding:4px">EU</th><th>US</th><th>月销量</th><th>销量趋势</th><th>W1→W2→W3→W4价格</th><th>价格趋势</th><th>🚢海运利润</th><th>✈️空运利润</th><th>🔮预测4月</th></tr>`;

  document.getElementById('trend-k14-1').innerHTML = `
    <b style="color:#16a34a">✅ 海运+空运均盈利（推荐进货）</b>
    <div style="overflow-x:auto;margin:6px 0 12px"><table style="width:100%;font-size:0.75rem;border-collapse:collapse">${thead}${rowsProfit}</table></div>
    <b style="color:#d97706">⚡ 仅海运盈利（空运亏损，谨慎进货）</b>
    <div style="overflow-x:auto;margin:6px 0 12px"><table style="width:100%;font-size:0.75rem;border-collapse:collapse">${thead}${rowsSea}</table></div>
    <b style="color:#dc2626">❌ 目前亏损（观察价格趋势是否回暖）</b>
    <div style="overflow-x:auto;margin:6px 0 8px"><table style="width:100%;font-size:0.75rem;border-collapse:collapse">${thead}${rowsLoss}</table></div>
    <div style="font-size:0.72rem;color:#64748b">
      W1=3/1-7 | W2=3/8-14 | W3=3/15-21 | W4=3/22-31 &nbsp;|&nbsp; 🔮预测基于后半月销量趋势外推
    </div>
  `;
}

// ── Generic Chart Builder (reusable for any shoe) ────────────────────────────
function buildChartGeneric(shoeId, weeklyData, title) {
  const entries = Object.entries(weeklyData);
  const profitEntries = entries.filter(([,d]) => d.pSea !== null && d.pSea > 0);
  const lossEntries   = entries.filter(([,d]) => d.pSea === null || d.pSea <= 0).sort((a,b)=>b[1].count-a[1].count).slice(0,8);

  // Chart 1: profitable
  if (profitEntries.length > 0) {
    makeLineChart('canvas-profit-'+shoeId, WEEKS,
      profitEntries.map(([k,d],i) => ({
        label: k, data: d.weekly,
        borderColor: PALETTE_GREEN[i%PALETTE_GREEN.length],
        backgroundColor: PALETTE_GREEN[i%PALETTE_GREEN.length]+'22',
        borderWidth:2, pointRadius:4, tension:0.3, fill:false,
        spanGaps: true,
      }))
    );
  } else {
    const c = document.getElementById('canvas-profit-'+shoeId);
    if (c) { const ctx=c.getContext('2d'); ctx.fillStyle='#64748b'; ctx.font='14px sans-serif'; ctx.fillText('无海运+空运均盈利尺码',20,60); }
  }

  // Chart 2: loss
  makeLineChart('canvas-loss-'+shoeId, WEEKS,
    lossEntries.map(([k,d],i) => ({
      label: k, data: d.weekly,
      borderColor: PALETTE_RED[i%PALETTE_RED.length],
      backgroundColor: PALETTE_RED[i%PALETTE_RED.length]+'22',
      borderWidth:1.5, borderDash:[5,3], pointRadius:3, tension:0.3, fill:false,
      spanGaps: true,
    }))
  );

  // Chart 3: volume
  const sorted = entries.sort((a,b)=>b[1].count-a[1].count);
  const cVol = document.getElementById('canvas-vol-'+shoeId);
  if (cVol) {
    if (charts['canvas-vol-'+shoeId]) charts['canvas-vol-'+shoeId].destroy();
    charts['canvas-vol-'+shoeId] = new Chart(cVol, {
      type:'bar',
      data:{
        labels: sorted.map(([k])=>{ const m=k.match(/\(([^)]+)\)/); return m?m[1]:k; }),
        datasets:[{
          label:'3月销量',
          data: sorted.map(([,d])=>d.count),
          backgroundColor: sorted.map(([,d])=>
            d.pAir>0?'rgba(22,163,74,0.75)':d.pSea>0?'rgba(217,119,6,0.75)':d.pSea===null?'rgba(150,150,150,0.5)':'rgba(220,38,38,0.6)'
          ), borderWidth:1,
        }]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{legend:{position:'top',labels:{font:{size:11},boxWidth:12}}},
        scales:{x:{grid:{color:'#f1f5f9'},ticks:{font:{size:10}}},y:{beginAtZero:true,title:{display:true,text:'销量（笔）'}}}
      }
    });
  }

  // Summary
  const thead=`<tr style="background:#f1f5f9;color:#64748b;font-size:0.72rem"><th style="padding:4px">EU</th><th>US</th><th>月销量</th><th>W1→W2→W3→W4成交价</th><th>🚢海运</th><th>✈️空运</th></tr>`;
  const makeRow=([k,d],bg='')=>{
    const m2=k.match(/\(([^)]+)\)/); const eu=m2?m2[1]:k; const us=k.split('(')[0];
    const w=d.weekly.map(p=>p?'$'+p:'—').join('→');
    const pS=d.pSea===null?'—':d.pSea>=0?`<span style="color:#16a34a;font-weight:700">+$${d.pSea.toFixed(0)}</span>`:`<span style="color:#dc2626">-$${Math.abs(d.pSea).toFixed(0)}</span>`;
    const pA=d.pAir===null?'—':d.pAir>=0?`<span style="color:#16a34a;font-weight:700">+$${d.pAir.toFixed(0)}</span>`:`<span style="color:#dc2626">-$${Math.abs(d.pAir).toFixed(0)}</span>`;
    return `<tr style="${bg}"><td>${eu}</td><td>${us}</td><td><b>${d.count}</b></td><td style="font-size:0.7rem">${w}</td><td>${pS}</td><td>${pA}</td></tr>`;
  };
  const profitRows=entries.filter(([,d])=>d.pSea!==null&&d.pSea>0).sort((a,b)=>b[1].count-a[1].count).map(e=>makeRow(e,'background:#f0fdf4')).join('');
  const lossRows=entries.filter(([,d])=>d.pSea===null||d.pSea<=0).sort((a,b)=>b[1].count-a[1].count).map(e=>makeRow(e,'')).join('');

  document.getElementById('trend-'+shoeId).innerHTML=`
    <b>${title}</b>（3月共${entries.reduce((s,[,d])=>s+d.count,0)}笔）<br><br>
    <b style="color:#16a34a">✅ 盈利尺码</b>
    <div style="overflow-x:auto;margin:6px 0 10px"><table style="width:100%;font-size:0.75rem;border-collapse:collapse">${thead}${profitRows||'<tr><td colspan="6" style="color:#dc2626;padding:8px">暂无海运+空运均盈利尺码</td></tr>'}</table></div>
    <b style="color:#dc2626">❌ 亏损尺码</b>
    <div style="overflow-x:auto;margin:6px 0 6px"><table style="width:100%;font-size:0.75rem;border-collapse:collapse">${thead}${lossRows}</table></div>
    <div style="font-size:0.72rem;color:#64748b">W1=3/1-7 | W2=3/8-14 | W3=3/15-21 | W4=3/22-31</div>
  `;
}

          borderWidth:2, pointRadius:3, fill:false, tension:0.3,

      options: {
        responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{position:'top',labels:{font:{size:11},boxWidth:12}} },
        scales:{
          x:{grid:{color:'#f1f5f9'},ticks:{font:{size:10}}},
          y:{beginAtZero:true,title:{display:true,text:'销量（笔）'},grid:{color:'#f1f5f9'}}
        }
      }
    });

  const makeRow = ([k,d], bg='') => {

  const seaRows   = entries.filter(([,d])=>d.pSea!==null&&d.pSea>0&&(d.pAir===null||d.pAir<=0)).sort((a,b)=>b[1].count-a[1].count).map(e=>makeRow(e,'background:#fffbeb')).join('');
  const lossRows  = entries.filter(([,d])=>d.pSea===null||d.pSea<=0).sort((a,b)=>b[1].count-a[1].count).map(e=>makeRow(e,'')).join('');

  document.getElementById('trend-k14-2').innerHTML = `

    </div>
  `;
}
